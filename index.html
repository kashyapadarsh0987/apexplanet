<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentRide - Vehicle Rental</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>RentRide</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#vehicles">Vehicles</a>
            <a href="#contact">Contact</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Signup</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Rent Bikes, Scooty & Cars Easily</h2>
        <p>Affordable | Fast Booking | Trusted Service</p>
        <button onclick="showAlert()">Book Now</button>
        <a href="booking.html"><button>Go to Booking</button></a>
    </section>

    <!-- Vehicle Section -->
    <section id="vehicles">
    <h2>Available Vehicles</h2>

    <div class="vehicle-container">

        <!-- Bike -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1558981403-c5f9899a28bc?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YmlrZXxlbnwwfHwwfHx8MA%3D%3D" alt="Bike">
            <h3>Bike</h3>
            <p>₹500/day</p>
            <button onclick="bookVehicle('Bike')">Rent Now</button>
        </div>

        <!-- Scooty -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1744298350381-93ce34512d51?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fHNjb290eXxlbnwwfHwwfHx8MA%3D%3D" alt="Scooty">
            <h3>Scooty</h3>
            <p>₹300/day</p>
            <button onclick="bookVehicle('Scooty')">Rent Now</button>
        </div>

        <!-- Car -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" alt="Car">
            <h3>Car</h3>
            <p>₹1500/day</p>
            <button onclick="bookVehicle('Car')">Rent Now</button>
        </div>

    </div>

</section>

    <!-- Contact -->
    <section id="contact">
        <h2>Contact Us</h2>
        <p>Email: adarshkashyap0000@gmail.com</p>
        <p>Phone: 9341524270</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
